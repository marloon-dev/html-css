<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="midias/favicon.ico" type="image/x-icon">
    <title>Video com HTML5</title>
</head>
<body>
    <h1>Inserindo video hospedado localmente</h1>
    <p>Esse video está hospedado no meu próprio servidor.</p>
    <h2>video em MP$</h2>
    <video src="midias/meu-vbideo700p.mp4" width="500"></video>
    <h2>video webm</h2>
    <video src="midias/meu-vbideo700p.webm" width="500"  controls></video>
    <h1> Inserir video da forma mais correta</h1>
    <video controls width="500" poster="imagens/meninas.jpeg">
        <source src="midias/meu-vbideo700p.mp4"type="video/mp4">
        <source src="midias/meu-vbideo700p.webm"type="video/webm"> 
    </video>
    <h1>Inserir video do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/LW0bhKitRBk?si=vEPQq46xAzeSDHOE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
