<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Animated Login Form</title>
</head>
<body>
    <div class="square" id="card">
        <i style="--clr:#00ff0a;"></i>
        <i style="--clr:#ff0057;"></i>
        <i style="--clr:#fffd44;"></i>

        <div class="login">
            <h2 id="loginTitle" data-text="Login">Login</h2>

            <form id="loginForm">
                <div class="inputBx reveal">
                    <input type="text" id="username" placeholder="Username" required>
                </div>

                <div class="inputBx passwordBox reveal">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" class="togglePassword" id="togglePassword" aria-label="Mostrar ou ocultar senha">
                        Show
                    </button>
                </div>

                <div class="inputBx reveal">
                    <input type="submit" id="submitBtn" value="Sign in">
                </div>
            </form>

            <p class="message" id="formMessage" aria-live="polite"></p>

            <div class="links reveal">
                <a href="#">Forget Password</a>
                <a href="#">Sign up</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
